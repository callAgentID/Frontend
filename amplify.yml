version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - node --version
        - npm install --legacy-peer-deps
    build:
      commands:
        - npm run build
        - cp -r public .next/standalone/public
        - cp -r .next/static .next/standalone/.next/static
  artifacts:
    baseDirectory: .next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
